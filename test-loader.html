<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minimal Loader Test</title>
  <style>
    body { margin: 0; padding: 0; background: #0a0e27; font-family: Arial; }
    .loader {
      position: fixed;
      inset: 0;
      background: #0a0e27;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.6s, visibility 0.6s;
    }
    .loader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loader-content { text-align: center; color: #00d9ff; }
    .loader-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }
    .loader-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d9ff, #7c3aed, #06b6d4);
      transform: scaleX(0);
      transform-origin: left;
    }
    .entry-screen {
      position: fixed;
      inset: 0;
      background: #0a0e27;
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f7fa;
      font-size: 32px;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s;
    }
    .entry-screen.show {
      opacity: 1;
      visibility: visible;
    }
    button {
      margin-top: 30px;
      padding: 10px 30px;
      background: #00d9ff;
      color: #0a0e27;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="loader-content">
      <div>Testing Loader</div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>

  <div class="entry-screen" id="entry">
    <div>
      <div>Entry Screen</div>
      <button onclick="enterSite()">Enter Site</button>
    </div>
  </div>

  <div id="main" style="display:none; color: #f5f7fa; padding: 20px;">
    <h1>✅ Main Content Loaded!</h1>
    <p>If you see this, the flow is working correctly.</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    console.log('✅ Script loaded');
    console.log('GSAP available:', typeof gsap !== 'undefined');

    function testLoader() {
      console.log('🚀 Starting loader test...');
      const loader = document.getElementById('loader');
      const barFill = document.querySelector('.loader-bar-fill');
      const entry = document.getElementById('entry');

      // Animate bar
      gsap.fromTo(barFill, { scaleX: 0 }, {
        scaleX: 1,
        duration: 2,
        ease: 'power2.inOut',
        onComplete: () => {
          console.log('✅ Loader animation complete');
          
          // Hide loader
          gsap.to(loader, {
            opacity: 0,
            duration: 0.6,
            onComplete: () => {
              loader.classList.add('hidden');
              console.log('✅ Loader hidden');
              
              // Show entry
              entry.classList.add('show');
              console.log('✅ Entry screen shown');
            }
          });
        }
      });
    }

    function enterSite() {
      console.log('🎉 Entering site!');
      document.getElementById('entry').style.display = 'none';
      document.getElementById('main').style.display = 'block';
    }

    // Start test
    testLoader();
  </script>
</body>
</html>
