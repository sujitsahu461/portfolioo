<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portfolio Debug</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0e27;
      color: #f5f7fa;
      font-family: Arial, sans-serif;
    }
    .log {
      background: #1a1f3a;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border-left: 4px solid #00d9ff;
      font-size: 14px;
      font-family: monospace;
    }
    .success { border-left-color: #00ff00; color: #00ff00; }
    .error { border-left-color: #ff0000; color: #ff0000; }
    .info { border-left-color: #00d9ff; color: #00d9ff; }
  </style>
</head>
<body>
  <h1>🔍 Portfolio Debug Console</h1>
  <div id="logs"></div>

  <script>
    const logsContainer = document.getElementById('logs');
    
    function addLog(message, type = 'info') {
      const logDiv = document.createElement('div');
      logDiv.className = `log ${type}`;
      logDiv.textContent = message;
      logsContainer.appendChild(logDiv);
      console.log(`[${type.toUpperCase()}]`, message);
    }

    // Check if GSAP is loaded
    addLog('Page loaded, checking dependencies...', 'info');
    
    if (typeof gsap !== 'undefined') {
      addLog('✅ GSAP is loaded', 'success');
      if (typeof ScrollTrigger !== 'undefined') {
        addLog('✅ ScrollTrigger plugin is loaded', 'success');
      } else {
        addLog('❌ ScrollTrigger plugin NOT loaded', 'error');
      }
    } else {
      addLog('❌ GSAP is NOT loaded', 'error');
    }

    // Check HTML elements
    if (document.getElementById('loader')) {
      addLog('✅ Loader element exists', 'success');
    } else {
      addLog('❌ Loader element NOT found', 'error');
    }

    if (document.getElementById('entryScreen')) {
      addLog('✅ Entry screen element exists', 'success');
    } else {
      addLog('❌ Entry screen element NOT found', 'error');
    }

    if (document.getElementById('enterBtn')) {
      addLog('✅ Enter button element exists', 'success');
    } else {
      addLog('❌ Enter button element NOT found', 'error');
    }

    // Check CSS
    const loader = document.getElementById('loader');
    if (loader) {
      const styles = window.getComputedStyle(loader);
      addLog(`Loader z-index: ${styles.zIndex}`, 'info');
      addLog(`Loader display: ${styles.display}`, 'info');
      addLog(`Loader opacity: ${styles.opacity}`, 'info');
    }

    addLog('Debug check complete!', 'success');
  </script>
</body>
</html>
